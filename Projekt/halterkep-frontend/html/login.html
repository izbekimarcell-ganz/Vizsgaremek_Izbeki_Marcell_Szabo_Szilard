<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HalBarátok - Bejelentkezés</title>

  <link rel="icon" type="image/png" href="../assets/favicon.png" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body data-page="login" data-theme="dark">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top">
    <div class="container nav-container">
      <a class="navbar-brand d-flex align-items-center gap-3" href="index.html">
        <img src="../assets/logo.png" alt="HalBarátok logó" class="brand-logo" />
        <div>
          <div class="fw-bold brand-title">HalBarátok</div>
          <small class="brand-subtitle">Horgászvizek • Halfajok • Fogásnapló • Fórum</small>
        </div>
      </a>

      <div class="nav-actions-mobile d-lg-none">
        <button id="themeToggleMobile" class="theme-toggle-btn" type="button" aria-label="Téma váltása">
          <span class="theme-icon">☀️</span>
        </button>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>

      <button class="navbar-toggler d-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center" id="navbarMenu">
          <li class="nav-item friend-search-nav">
            <div class="friend-search-container" id="friendSearchContainer">
              <button class="friend-search-toggle" id="friendSearchToggle" type="button" aria-label="Ismerősök keresése">🔍</button>
              <input id="friendSearchInput" class="form-control app-input friend-search-input" type="text" placeholder="Ismerősök keresése" autocomplete="off" />
              <ul id="friendSearchResults" class="friend-search-results d-none"></ul>
            </div>
          </li>
          <li class="nav-item"><a class="nav-link" href="index.html">Kezdőlap</a></li>
          <li class="nav-item"><a class="nav-link" href="vizteruletek.html">Vízterületek</a></li>
          <li class="nav-item"><a class="nav-link" href="fogasnaplo.html">Fogásnapló</a></li>
          <li class="nav-item"><a class="nav-link" href="forum.html">Fórum</a></li>
          <li class="nav-item d-none" id="adminNavItem"><a class="nav-link" href="admin.html">Admin</a></li>
          <li class="nav-item d-none" id="profilNavItem"><a class="nav-link" href="profil.html">Profil</a></li>

          <li class="nav-item ms-lg-2 mt-2 mt-lg-0 d-none d-lg-block">
            <button id="themeToggleDesktop" class="theme-toggle-btn" type="button" aria-label="Téma váltása">
              <span class="theme-icon">☀️</span>
            </button>
          </li>

          <li class="nav-item ms-lg-2 mt-2 mt-lg-0" id="loginNavItem">
            <a class="btn btn-outline-light btn-sm" href="login.html">Bejelentkezés</a>
          </li>
          <li class="nav-item ms-lg-2 mt-2 mt-lg-0" id="registerNavItem">
            <a class="btn btn-primary btn-sm" href="register.html">Regisztráció</a>
          </li>
          <li class="nav-item ms-lg-2 mt-2 mt-lg-0 d-none" id="logoutNavItem">
            <button class="btn btn-outline-danger btn-sm" onclick="handleLogout()">Kijelentkezés</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <!-- Navbar vége -->

  <!-- Fő tartalom -->
  <main class="main-content py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
          <div class="card app-card">
            <div class="card-body p-4">
              <h1 class="h3 mb-4 text-center">Bejelentkezés</h1>

              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label class="form-label" for="loginIdentifier">Felhasználónév vagy Email</label>
                  <input 
                    id="loginIdentifier" 
                    name="azonosito" 
                    class="form-control app-input" 
                    required
                    autocomplete="username"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label" for="loginPassword">Jelszó</label>
                  <input 
                    id="loginPassword" 
                    name="jelszo" 
                    type="password" 
                    class="form-control app-input" 
                    required
                    autocomplete="current-password"
                  />
                </div>

                <button id="loginButton" class="btn btn-primary w-100 mb-3" type="submit">
                  Belépés
                </button>

                <div class="text-center">
                  <p class="section-text mb-0">
                    Nincs még fiókod? 
                    <a href="register.html" class="text-primary">Regisztrálj itt</a>
                  </p>
                </div>
              </form>

              <div class="border-top border-secondary-subtle mt-4 pt-4">
                <div class="text-center mb-3">
                  <button
                    id="forgotPasswordToggle"
                    class="btn btn-link text-primary text-decoration-none p-0"
                    type="button"
                  >
                    Elfelejtetted a jelszavad?
                  </button>
                </div>

                <div id="forgotPasswordPanel" class="d-none">
                  <form id="forgotLookupForm" novalidate>
                    <div class="mb-3">
                      <label class="form-label" for="forgotIdentifier">Felhasználónév vagy Email</label>
                      <input
                        id="forgotIdentifier"
                        name="elfelejtettAzonosito"
                        class="form-control app-input"
                        required
                        autocomplete="username"
                      />
                    </div>

                    <button class="btn btn-outline-primary w-100" type="submit">
                      Biztonsági kérdés betöltése
                    </button>
                  </form>

                  <form id="forgotResetForm" class="d-none mt-4" novalidate>
                    <div class="mb-3">
                      <label class="form-label">Biztonsági kérdés</label>
                      <div id="forgotQuestionText" class="form-control app-input py-3" aria-live="polite"></div>
                    </div>

                    <div class="mb-3">
                      <label class="form-label" for="forgotSecurityAnswer">Válasz</label>
                      <input
                        id="forgotSecurityAnswer"
                        name="elfelejtettValasz"
                        class="form-control app-input"
                        required
                        autocomplete="off"
                      />
                    </div>

                    <div class="mb-3">
                      <label class="form-label" for="forgotNewPassword">Új jelszó</label>
                      <input
                        id="forgotNewPassword"
                        name="ujJelszo"
                        type="password"
                        class="form-control app-input"
                        required
                        autocomplete="new-password"
                      />
                    </div>

                    <div class="mb-3">
                      <label class="form-label" for="forgotNewPasswordConfirm">Új jelszó megerősítése</label>
                      <input
                        id="forgotNewPasswordConfirm"
                        name="ujJelszoConfirm"
                        type="password"
                        class="form-control app-input"
                        required
                        autocomplete="new-password"
                      />
                    </div>

                    <button class="btn btn-primary w-100" type="submit">
                      Új jelszó mentése
                    </button>
                  </form>
                </div>
              </div>

              <div id="loginMessage" class="alert mt-3 d-none"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <!-- Fő tartalom vége -->

  <!-- Footer -->
  <footer class="py-4 border-top border-secondary-subtle app-footer">
    <div class="container text-center footer-text">© HalBarátok</div>
  </footer>
  <!-- Footer vége -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../JavaScript/script.js"></script>
  <script src="../JavaScript/marketplace.js"></script>
  <script src="../JavaScript/app-pages.js"></script>
  <script src="../JavaScript/admin.js"></script>
  <script src="../JavaScript/profile.js"></script>
  <script src="../JavaScript/friend-search.js"></script>
  <script src="../JavaScript/login.js"></script>
</body>
</html>
